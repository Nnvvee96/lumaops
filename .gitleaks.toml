# gitleaks config — extends the default rule set with LumaOps-specific
# allowlist entries. The default ruleset is comprehensive enough for
# the MVP; this file mostly exists to make project-specific exceptions
# explicit rather than commenting them inline.

title = "LumaOps gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Project-specific allowlist"
paths = [
  # Lockfile contains transitive package URLs / shasums, no secrets.
  '''pnpm-lock\.yaml''',
  # Generated by Next.js, never user content.
  '''apps/web/next-env\.d\.ts''',
]

regexes = [
  # Placeholder example tokens in docs / .env.example
  '''ghp_xxxxx''',
  '''sk_test_example''',
]
