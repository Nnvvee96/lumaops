    </mask>
  </defs>

  
  <rect width="1200" height="630" fill="#0c0b08"></rect>

  
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#grid-mask)" opacity="0.45"></rect>

  
  <rect width="1200" height="630" fill="url(#bg-wash)"></rect>

  
  <g opacity="0.55">
