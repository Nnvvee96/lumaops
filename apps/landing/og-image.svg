<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    
    <radialGradient id="bg-wash" cx="0.32" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#dff066" stop-opacity="0.22"></stop>
      <stop offset="50%" stop-color="#dff066" stop-opacity="0.06"></stop>
      <stop offset="100%" stop-color="#dff066" stop-opacity="0"></stop>
    </radialGradient>

    
    <radialGradient id="node-halo" cx="0.5" cy="0.5" r="0.5">
