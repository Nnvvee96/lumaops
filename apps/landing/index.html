<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image" />

<meta name="twitter:creator" content="@nnvve9" />

<meta name="twitter:description" content="Five signals. One room. Open-source, self-hosted operations cockpit for indie founders." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet" />

<style>
  :root {
    /* DARK by default — warmer near-black */
    --paper:        #0c0b08;
    --paper-1:      #14120d;
    --paper-2:      #1c1a13;
    --line:         #26231b;
    --line-2:       #36322a;
    --ink:          #f3efe4;
    --ink-mid:      #aba89c;
    --ink-low:      #75726a;
    --ink-dim:      #4d4a42;

    /* INK sections (dramatic feature blocks) — slightly distinct deeper black */
    --ink-bg:       #060503;
    --ink-bg-1:     #0e0c08;
    --ink-bg-2:     #161410;
    --ink-line:     #221f17;
    --ink-line-2:   #2e2a21;
    --ink-paper:    #f3efe4;
    --ink-text-mid: #aba89c;
    --ink-text-low: #75726a;

    /* LUMI — same identity, calibrated for dark */
    --lumi:         oklch(0.86 0.19 110);
    --lumi-dk:      oklch(0.88 0.19 110);
    --lumi-deep:    oklch(0.78 0.17 110);
    --lumi-soft:    oklch(0.55 0.14 115);

    /* Contextual signal palette — for dashboard data */
    --growth:       var(--lumi);
    --growth-dk:    var(--lumi-dk);
    --revenue:      oklch(0.78 0.13 80);
    --revenue-dk:   oklch(0.82 0.13 80);
    --release:      oklch(0.74 0.14 285);
    --release-dk:   oklch(0.76 0.14 285);
    --support:      oklch(0.72 0.16 28);
    --support-dk:   oklch(0.74 0.16 28);

    --radius:       6px;
    --radius-lg:    10px;
    --radius-xl:    14px;

    --font-sans: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
    --font-serif: "Instrument Serif", "Iowan Old Style", serif;

    color-scheme: dark;
  }

  /* LIGHT theme — opt-in via toggle */
  :root[data-theme="light"] {
    --paper:        #f5f3ec;
    --paper-1:      #ede9de;
    --paper-2:      #e2ddcb;
    --line:         #d3cdba;
    --line-2:       #bdb6a0;
    --ink:          #14130f;
    --ink-mid:      #56544a;
    --ink-low:      #87847a;
    --ink-dim:      #b5b0a0;

    --ink-bg:       #0f0e0a;
    --ink-bg-1:     #16140e;
    --ink-bg-2:     #1d1b13;
    --ink-line:     #28251c;
    --ink-line-2:   #383426;
    --ink-paper:    #f5f3ec;
    --ink-text-mid: #aba89c;
    --ink-text-low: #6e6b60;

    --lumi:         oklch(0.82 0.18 110);
    --lumi-dk:      oklch(0.88 0.19 110);
    --lumi-deep:    oklch(0.50 0.14 115);

    --revenue:      oklch(0.62 0.13 65);
    --release:      oklch(0.55 0.14 285);
    --support:      oklch(0.58 0.16 28);

    color-scheme: light;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    overflow-x: hidden;
    max-width: 100vw;
  }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-sans);
    font-feature-settings: "ss01", "cv11", "cv02";
    font-size: 15.5px;
    line-height: 1.55;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  ::selection { background: var(--ink); color: var(--paper); }
  img, svg { display: block; max-width: 100%; }
  a { color: inherit; }

  /* Paper grain (subtle) */
  body::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0.035;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.7'/></svg>");
  }

  /* Layout */
  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  .wrap-narrow { max-width: 1080px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 720px) {
    .wrap, .wrap-narrow { padding: 0 20px; }
  }

  /* Hero proof bar — responsive */
  @media (max-width: 880px) {
    .hero-proof { grid-template-columns: 1fr !important; }
    .hero-proof-cells { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (max-width: 540px) {
    .hero-proof-cells { grid-template-columns: 1fr !important; }
  }

  /* Inline lumi-mark inside headlines */
  .lumi-mark-inline {
    display: inline-block;
    vertical-align: middle;
  }

  /* Type scale */
  h1, h2, h3, h4 { margin: 0; font-weight: 400; line-height: 1.02; }
  h1 {
    font-size: clamp(52px, 7.2vw, 116px);
    font-weight: 300;
    letter-spacing: -0.042em;
    line-height: 0.95;
  }
  h2 {
    font-size: clamp(36px, 4.4vw, 72px);
    font-weight: 300;
    letter-spacing: -0.035em;
    line-height: 1.0;
  }
  h3 {
    font-size: clamp(22px, 2.2vw, 28px);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }
  p { margin: 0; color: var(--ink-mid); }
  .lede { font-size: 18px; line-height: 1.5; color: var(--ink-mid); letter-spacing: -0.005em; }
  @media (max-width: 720px) { .lede { font-size: 16.5px; } }

  /* Editorial italic accent */
  .serif {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.015em;
  }

  /* Mono labels */
  .mono { font-family: var(--font-mono); font-feature-settings: "tnum", "zero"; }
  .micro {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-low);
  }
  .num-tag {
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-low);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .num-tag::after {
    content: ""; flex: 1; height: 1px; background: var(--line);
  }
  .num-tag.short::after { flex: 0 0 80px; }

  /* Tabular nums */
  .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum", "ss02"; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    height: 42px; padding: 0 20px;
    font-family: var(--font-sans);
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: -0.005em;
    border-radius: 999px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 160ms ease, color 160ms ease, border-color 160ms ease, transform 200ms cubic-bezier(0.2, 0.8, 0.2, 1);
    text-decoration: none;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--ink); color: var(--paper);
    border-color: var(--ink);
    position: relative;
  }
  .btn-primary::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 999px;
    box-shadow: 0 0 0 0 color-mix(in oklch, var(--lumi) 65%, transparent);
    transition: box-shadow 300ms ease;
    pointer-events: none;
  }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:hover::before { box-shadow: 0 0 0 4px color-mix(in oklch, var(--lumi) 28%, transparent); }
  .btn-ghost {
    background: transparent; color: var(--ink);
    border-color: var(--line-2);
  }
  .btn-ghost:hover { background: var(--paper-1); border-color: var(--ink); }
  .btn .arrow { transition: transform 200ms ease; }
  .btn:hover .arrow { transform: translateX(3px); }

  /* Pill */
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    height: 26px; padding: 0 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--ink-mid);
    background: color-mix(in oklch, var(--paper-1) 50%, transparent);
  }
  .pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--lumi);
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--lumi) 30%, transparent);
  }
  .pill.live .dot { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }

  /* Reveal on load — staggered */
  .reveal { opacity: 0; transform: translateY(8px); }
  .revealed { animation: reveal 800ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  @keyframes reveal {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Reveal on scroll */
  .vreveal { opacity: 0; transform: translateY(16px); transition: opacity 800ms cubic-bezier(0.2, 0.8, 0.2, 1), transform 800ms cubic-bezier(0.2, 0.8, 0.2, 1); }
  .vreveal.in { opacity: 1; transform: translateY(0); }

  /* Section spacing */
  section { position: relative; }
  .section-pad { padding: 72px 0; }
  .section-pad-sm { padding: 48px 0; }
  .section-pad-lg { padding: 88px 0; }
  @media (max-width: 720px) {
    .section-pad { padding: 56px 0; }
    .section-pad-lg { padding: 64px 0; }
  }

  /* Rule lines */
  .rule { height: 1px; background: var(--line); width: 100%; }

  /* Dark surface (for cockpit moment) */
  .dark {
    background: var(--ink-bg);
    color: var(--ink-paper);
  }
  .dark p { color: var(--ink-text-mid); }
  .dark .micro, .dark .num-tag { color: var(--ink-text-low); }
  .dark .num-tag::after { background: var(--ink-line); }
  .dark .rule { background: var(--ink-line); }
  .dark .pill {
    border-color: var(--ink-line-2);
    background: rgba(255,255,255,0.025);
    color: var(--ink-text-mid);
  }
  .dark .pill .dot {
    background: var(--growth-dk);
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--growth-dk) 25%, transparent);
  }

  /* Corner marks (subtle) */
  .corners { position: relative; }
  .corners .ct, .corners .cb { position: absolute; width: 10px; height: 10px; border-color: var(--ink-low); pointer-events: none; }
  .corners .ct.l { top: -5px; left: -5px; border-top: 1px solid; border-left: 1px solid; }
  .corners .ct.r { top: -5px; right: -5px; border-top: 1px solid; border-right: 1px solid; }
  .corners .cb.l { bottom: -5px; left: -5px; border-bottom: 1px solid; border-left: 1px solid; }
  .corners .cb.r { bottom: -5px; right: -5px; border-bottom: 1px solid; border-right: 1px solid; }
  .dark .corners .ct, .dark .corners .cb { border-color: var(--ink-text-low); }

  /* Caret blink */
  @keyframes blink { 50% { opacity: 0; } }
  .caret { display: inline-block; width: 7px; height: 14px; vertical-align: -2px; background: var(--growth-dk); margin-left: 4px; animation: blink 1s steps(1) infinite; }

  /* Sparkline draw */
  .spark path {
    fill: none; stroke-width: 1.5;
    stroke-dasharray: var(--len, 300);
    stroke-dashoffset: var(--len, 300);
  }
  .spark.in path { animation: draw 1.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  /* Bar grow */
  .bar-fill { transform-origin: left; transform: scaleX(0); transition: transform 1.1s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .in .bar-fill { transform: scaleX(1); }

  /* No-overflow safety */
  .clip { overflow: hidden; }

  /* ===================================================================
     MOBILE RESPONSIVE PATCH — aggressive, prefix-scoped to win specificity
     =================================================================== */

  /* Tablet / smaller laptops */
  @media (max-width: 880px) {
    body h1 { font-size: clamp(40px, 9vw, 64px); letter-spacing: -0.035em; }
    body h2 { font-size: clamp(28px, 5.5vw, 46px); }
    body .section-pad-lg { padding: 64px 0; }
    body .section-pad { padding: 48px 0; }
  }

  /* Phone */
  @media (max-width: 720px) {
    body { font-size: 15px; }
    body .wrap, body .wrap-narrow { padding: 0 16px; }

    /* Type */
    body h1 { font-size: clamp(34px, 11vw, 50px) !important; letter-spacing: -0.035em; line-height: 1.0; }
    body h2 { font-size: clamp(24px, 8vw, 36px) !important; letter-spacing: -0.025em; line-height: 1.05; }
    body h3 { font-size: 17px !important; }
    body p, body .lede { font-size: 15px; line-height: 1.55; }
    body .lede { font-size: 16px !important; }

    /* Section spacing */
    body .section-pad-lg { padding: 48px 0 !important; }
    body .section-pad { padding: 40px 0 !important; }

    /* NAV — hide the middle links + GitHub label, keep brand + toggle + clone */
    body nav > div > div:last-child { gap: 8px !important; }
    body nav ul { display: none !important; }
    body nav .btn { height: 32px !important; padding: 0 10px !important; font-size: 11.5px !important; }
    body nav button[aria-label*="mode"] { width: 32px !important; height: 32px !important; }

    /* Buttons everywhere */
    body .btn { height: 38px; padding: 0 14px; font-size: 12.5px; }

    /* Num tag — keep on one line, shrink */
    body .num-tag { font-size: 10px !important; letter-spacing: 0.12em !important; gap: 10px !important; }

    /* Pill */
    body .pill { font-size: 10.5px; height: 24px; padding: 0 10px; }
    body .micro { font-size: 10px !important; }
  }

  /* ====== Section-specific phone overrides ====== */

  /* Hero category-pill — wrap, smaller */
  @media (max-width: 720px) {
    body .hero-cat-pill {
      flex-wrap: wrap !important;
      justify-content: center !important;
      gap: 6px !important;
      padding: 6px 12px !important;
      font-size: 10.5px !important;
      border-radius: 12px !important;
    }
    body .hero-cat-pill > span:nth-child(2),
    body .hero-cat-pill > span:nth-child(4) {
      display: none !important;
    }
  }

  /* Hero eyebrow row — keep tight */
  @media (max-width: 720px) {
    body #top > .wrap > .reveal:first-of-type {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 10px !important;
      padding-top: 8px !important;
      margin-bottom: 32px !important;
    }
  }

  /* Hero proof bar — stack the label rail + cells */
  @media (max-width: 720px) {
    body .hero-proof { grid-template-columns: 1fr !important; }
    body .hero-proof-cells { grid-template-columns: 1fr 1fr !important; }
    body .hero-proof-cells > div { padding: 12px !important; min-height: 86px !important; }
    body .hero-proof-cells > div .tnum { font-size: 16px !important; }
    body .hero-proof-cells > div > div:first-child { font-size: 9.5px !important; }
  }

  /* Five Signals rows — force single column stack */
  @media (max-width: 880px) {
    body .signal-row {
      display: grid !important;
      grid-template-columns: 1fr !important;
      gap: 14px !important;
      padding: 24px 18px !important;
      align-items: start !important;
    }
    body .signal-verb {
      font-size: clamp(28px, 7vw, 40px) !important;
      line-height: 1.0 !important;
    }
    body .signal-visual {
      height: 56px !important;
      width: 100% !important;
      max-width: 100% !important;
    }
  }

  /* Workspace table — collapse rows on mobile */
  @media (max-width: 760px) {
    body .workspace-head { display: none !important; }
    body .workspace-row {
      grid-template-columns: 1fr !important;
      gap: 10px !important;
      padding: 16px 14px !important;
      border-bottom: 1px solid var(--line);
    }
    /* hide the extra columns to keep it minimal */
    body .workspace-row > *:nth-child(4),
    body .workspace-row > *:nth-child(5),
    body .workspace-row > *:nth-child(6),
    body .workspace-row > *:nth-child(7) { display: none !important; }
  }

  /* Workspace summary cells — 2x2 on phone instead of 4x1 */
  @media (max-width: 640px) {
    body .workspace-row { grid-template-columns: 1fr !important; }
    body #workspace > .wrap > .vreveal:nth-of-type(3) > div > div:nth-child(2) {
      grid-template-columns: 1fr 1fr !important;
    }
  }

  /* Cockpit dashboard mock — contain it within a scrollable box */
  @media (max-width: 880px) {
    body .cockpit-mock-wrap {
      overflow-x: auto !important;
      -webkit-overflow-scrolling: touch !important;
      max-width: 100%;
      border: 1px solid var(--ink-line);
      border-radius: 12px;
      padding: 8px;
      background: var(--ink-bg-2);
    }
    body .cockpit-mock-wrap > div {
      min-width: 720px;
    }
  }

  /* Daily ritual beats — stack */
  @media (max-width: 760px) {
    body .ritual-beat {
      grid-template-columns: 1fr !important;
      gap: 14px !important;
      padding: 20px 0 22px !important;
    }
    body .ritual-line { left: 28px !important; }
  }

  /* Connectors grid */
  @media (max-width: 760px) {
    body .connectors-grid { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (max-width: 460px) {
    body .connectors-grid { grid-template-columns: 1fr !important; }
  }

  /* Principles grid */
  @media (max-width: 760px) {
    body .principles-grid { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 480px) {
    body .principles-grid { grid-template-columns: 1fr !important; }
  }

  /* Roadmap track — hide line, stack phases */
  @media (max-width: 880px) {
    body .roadmap-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
    body .roadmap-track > div:first-child { display: none !important; }
  }

  /* Final CTA */
  @media (max-width: 760px) {
    body .final-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
    body .final-grid h1 { font-size: clamp(34px, 9vw, 52px) !important; }
  }

  /* Manifesto grid */
  @media (max-width: 720px) {
    body .manifesto-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
  }

  /* Hero grid (used by many headline sections) */
  @media (max-width: 720px) {
    body .hero-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
  }

  /* Footer */
  @media (max-width: 640px) {
    body .footer-grid { gap: 28px !important; grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 480px) {
    body .footer-grid { grid-template-columns: 1fr !important; }
  }

  /* Marquee */
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee { display: flex; gap: 56px; animation: marquee 50s linear infinite; }
  .marquee:hover { animation-play-state: paused; }

  /* Tooltip helper (none currently) */

  /* Hide while React mounts to avoid flash */
  #root:empty::after {
    content: "";
    position: fixed; inset: 0; background: var(--paper);
  }
</style>

</head>
<body>

  <main id="root"></main>

  <!-- Theme: read saved preference BEFORE paint to avoid flash -->
  <script>
    (function() {
      try {
        var t = localStorage.getItem('lumaops-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
